version: "3.9"

services:

  appdb:
    image: mysql:8.0
    container_name: appdb
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    volumes:
      - appdb_data:/var/lib/mysql
    networks:
      test:
        aliases:
          - db   # optional: lets 'db' also resolve to this service
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8000:8000"
    depends_on:
      - user_service
      - product_service
      - order_service
    networks:
      - test
    restart: unless-stopped

  user_service:
    build: ./user_service
    environment:
      MYSQL_HOST: appdb         # <-- changed
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "5001:5001"
    depends_on:
      appdb:
        condition: service_healthy
    networks:
      - test
    restart: on-failure

  product_service:
    build: ./product_service
    environment:
      MYSQL_HOST: appdb         # <-- changed
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "5002:5002"
    depends_on:
      appdb:
        condition: service_healthy
    networks:
      - test
    restart: on-failure

  order_service:
    build: ./order_service
    environment:
      MYSQL_HOST: appdb         # <-- changed
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "5003:5003"
    depends_on:
      appdb:
        condition: service_healthy
    networks:
      - test
    restart: on-failure

  inventory_service:
    build: ./inventory_service
    environment:
      MYSQL_HOST: appdb         # <-- changed
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "5004:5004"
    depends_on:
      appdb:
        condition: service_healthy
    networks:
      - test
    restart: on-failure

  payment_service:
    build: ./payment_service
    environment:
      MYSQL_HOST: appdb         # <-- changed
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "5005:5005"
    depends_on:
      appdb:
        condition: service_healthy
    networks:
      - test
    restart: on-failure

  shipping_service:
    build: ./shipping_service
    environment:
      MYSQL_HOST: appdb         # <-- changed
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "5006:5006"
    depends_on:
      appdb:
        condition: service_healthy
    networks:
      - test
    restart: on-failure

  notification_service:
    build: ./notification_service
    environment:
      MYSQL_HOST: appdb         # <-- changed
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "5007:5007"
    depends_on:
      appdb:
        condition: service_healthy
    networks:
      - test
    restart: on-failure

networks:
  test:
    driver: bridge

volumes:
  appdb_data:
    driver: local